<app-header></app-header>
<section class="min-h-screen bg-gray-50/50 pt-28 pb-12">
    <!-- Sub-header / Search Area -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-12">
        <div class="flex flex-col md:flex-row gap-6 items-center justify-between">
            <div>
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">Discover Books</h1>
                <p class="text-gray-500 mt-1">Explore titles from readers near you</p>
            </div>

            <div class="flex items-center gap-4 w-full md:w-auto z-20">
                <!-- Search Bar -->
                <div class="relative w-full md:w-96 group">
                    <div
                        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none transition-colors group-focus-within:text-[#0DBE5E] text-gray-400">
                        <i class="fa-solid fa-search"></i>
                    </div>
                    <input type="search" [(ngModel)]="searchTerm" (input)="searchBooks()"
                        class="block w-full pl-10 pr-4 py-3 border-none rounded-2xl bg-white shadow-sm ring-1 ring-gray-200 focus:ring-2 focus:ring-[#0DBE5E] transition-all placeholder-gray-400 text-sm font-medium"
                        placeholder="Search by Title, Author..." />
                </div>
            </div>
        </div>
    </div>

    <!-- Book Grid -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div *ngIf="filteredBooks.length === 0" class="text-center py-20 opacity-60">
            <i class="fa-solid fa-book-open fa-3xl mb-4 text-gray-300"></i>
            <p class="text-lg text-gray-500">No books found matching your search.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div *ngFor="let book of filteredBooks" class="group relative">
                <!-- Card Container -->
                <div (click)="openBookDetailsModal(book.isbn, book.userUID, book.id)"
                    class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 cursor-pointer h-full border border-gray-100 flex flex-col">

                    <!-- Image Area -->
                    <div class="relative h-64 bg-gray-50 overflow-hidden flex items-center justify-center p-6">
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-black/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10">
                        </div>

                        <!-- Book Cover -->
                        <img [src]="book.coverImage || 'assets/default-book.png'" alt="{{ book.title }}"
                            class="h-full object-contain drop-shadow-md transform group-hover:scale-105 transition-transform duration-500 relative z-0" />

                        <!-- Condition Badge -->
                        <div class="absolute top-4 right-4 z-20">
                            <span
                                class="px-3 py-1 text-xs font-bold uppercase tracking-wider bg-white/90 backdrop-blur-md rounded-full shadow-sm text-gray-800 border border-gray-100">
                                {{ book.condition }}
                            </span>
                        </div>
                    </div>

                    <!-- Content Area -->
                    <div class="p-5 flex-1 flex flex-col">
                        <!-- Genre -->
                        <div class="mb-2">
                            <span
                                class="text-[10px] font-bold uppercase tracking-wide text-[#0DBE5E] bg-green-50 px-2 py-1 rounded-md">
                                {{ book.genre || 'General' }}
                            </span>
                        </div>

                        <!-- Title -->
                        <h3
                            class="text-lg font-bold text-gray-900 leading-snug mb-1 line-clamp-2 group-hover:text-[#0DBE5E] transition-colors">
                            {{ book.title }}
                        </h3>

                        <!-- Author -->
                        <p class="text-sm text-gray-500 font-medium mb-4 line-clamp-1">by {{ book.author }}</p>

                        <!-- Footer / Action -->
                        <div class="mt-auto pt-4 border-t border-gray-50 flex items-center justify-between">
                            <span class="text-xs text-gray-400 font-medium hover:text-gray-600 transition-colors">
                                <i class="fa-regular fa-user mr-1.5"></i> Owner
                            </span>
                            <div
                                class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-[#0DBE5E] group-hover:text-white transition-colors duration-300 shadow-sm">
                                <i
                                    class="fa-solid fa-arrow-right text-xs transform -rotate-45 group-hover:rotate-0 transition-transform duration-300"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <app-book-detail *ngIf="isModalOpen" [isbn]="selectedISBN" [ownerUid]="selectedUserUID" [bookId]="selectedBookId"
        (closeModalEvent)="closeModal()"></app-book-detail>
</section>
<app-footer></app-footer>
